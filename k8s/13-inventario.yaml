apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventario
  namespace: ticket-system
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: inventario
  template:
    metadata:
      labels:
        app: inventario
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - inventario
              topologyKey: kubernetes.io/hostname
      containers:
        - name: inventario
          image: python:3.11-alpine
          command: ["python", "/app/app.py"]
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              value: "http://database:8080"
            - name: DATABASE_TIMEOUT_SECONDS
              value: "2"
          volumeMounts:
            - name: app-code
              mountPath: /app/app.py
              subPath: app.py
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
      volumes:
        - name: app-code
          configMap:
            name: inventario-code
---
apiVersion: v1
kind: Service
metadata:
  name: inventario
  namespace: ticket-system
spec:
  selector:
    app: inventario
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
