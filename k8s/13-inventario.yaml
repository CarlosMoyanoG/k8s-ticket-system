apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventario
  namespace: ticket-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventario
  template:
    metadata:
      labels:
        app: inventario
    spec:
      containers:
        - name: inventario
          image: python:3.12-alpine
          command: ["python", "/app/app.py"]
          ports:
            - containerPort: 8080
          env:
            - name: DATA_FILE
              value: "/data/inventario.json"
            - name: INITIAL_SEATS
              value: "50"
          volumeMounts:
            - name: inventario-code
              mountPath: /app/app.py
              subPath: app.py
            - name: inventario-data
              mountPath: /data
      volumes:
        - name: inventario-code
          configMap:
            name: inventario-code
        - name: inventario-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: inventario
  namespace: ticket-system
spec:
  selector:
    app: inventario
  ports:
    - name: http
      port: 8080
      targetPort: 8080
