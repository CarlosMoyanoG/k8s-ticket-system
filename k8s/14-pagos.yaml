apiVersion: apps/v1
kind: Deployment
metadata:
  name: pagos
  namespace: ticket-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pagos
  template:
    metadata:
      labels:
        app: pagos
    spec:
      containers:
        - name: pagos
          image: python:3.12-alpine
          command: ["python", "/app/app.py"]
          ports:
            - containerPort: 8080
          env:
            - name: PAYMENT_DELAY_SECONDS
              value: "0"
            - name: PAYMENT_FAIL_RATE
              value: "0"
          volumeMounts:
            - name: pagos-code
              mountPath: /app/app.py
              subPath: app.py
      volumes:
        - name: pagos-code
          configMap:
            name: pagos-code
---
apiVersion: v1
kind: Service
metadata:
  name: pagos
  namespace: ticket-system
spec:
  selector:
    app: pagos
  ports:
    - name: http
      port: 8080
      targetPort: 8080
