apiVersion: apps/v1
kind: Deployment
metadata:
  name: pagos
  namespace: ticket-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pagos
  template:
    metadata:
      labels:
        app: pagos
    spec:
      containers:
        - name: pagos
          image: python:3.11-alpine
          command: ["python", "/app/app.py"]
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: PAYMENT_DELAY_SECONDS
              value: "0"
            - name: PAYMENT_FAIL_RATE
              value: "0"
          volumeMounts:
            - name: app-code
              mountPath: /app/app.py
              subPath: app.py
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: app-code
          configMap:
            name: pagos-code
---
apiVersion: v1
kind: Service
metadata:
  name: pagos
  namespace: ticket-system
spec:
  selector:
    app: pagos
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
