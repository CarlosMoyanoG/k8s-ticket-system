apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservas
  namespace: ticket-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reservas
  template:
    metadata:
      labels:
        app: reservas
    spec:
      containers:
        - name: reservas
          image: python:3.12-alpine
          command: ["python", "/app/app.py"]
          ports:
            - containerPort: 8080
          env:
            - name: INVENTARIO_URL
              value: "http://inventario:8080"
            - name: PAGOS_URL
              value: "http://pagos:8080"
            - name: NOTIFICACIONES_URL
              value: "http://notificaciones:8080"
            - name: DATABASE_URL
              value: "http://database:8080"
          volumeMounts:
            - name: reservas-code
              mountPath: /app/app.py
              subPath: app.py
      volumes:
        - name: reservas-code
          configMap:
            name: reservas-code
---
apiVersion: v1
kind: Service
metadata:
  name: reservas
  namespace: ticket-system
spec:
  selector:
    app: reservas
  ports:
    - name: http
      port: 8080
      targetPort: 8080
