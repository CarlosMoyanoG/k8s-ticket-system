apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ticket-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: python:3.12-alpine
          command: ["python", "/app/app.py"]
          ports:
            - containerPort: 8080
          env:
            - name: RESERVAS_URL
              value: "http://reservas:8080"
            - name: INVENTARIO_URL
              value: "http://inventario:8080"
          volumeMounts:
            - name: api-gateway-code
              mountPath: /app/app.py
              subPath: app.py
      volumes:
        - name: api-gateway-code
          configMap:
            name: api-gateway-code
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: ticket-system
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30081
