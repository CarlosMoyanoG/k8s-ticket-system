apiVersion: apps/v1
kind: Deployment
metadata:
  name: notificaciones
  namespace: ticket-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notificaciones
  template:
    metadata:
      labels:
        app: notificaciones
    spec:
      containers:
        - name: notificaciones
          image: python:3.12-alpine
          command: ["python", "/app/app.py"]
          ports:
            - containerPort: 8080
          env:
            - name: NOTIFICATION_FAIL_RATE
              value: "0"
          volumeMounts:
            - name: notificaciones-code
              mountPath: /app/app.py
              subPath: app.py
      volumes:
        - name: notificaciones-code
          configMap:
            name: notificaciones-code
---
apiVersion: v1
kind: Service
metadata:
  name: notificaciones
  namespace: ticket-system
spec:
  selector:
    app: notificaciones
  ports:
    - name: http
      port: 8080
      targetPort: 8080
