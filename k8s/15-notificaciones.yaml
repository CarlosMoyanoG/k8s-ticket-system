apiVersion: apps/v1
kind: Deployment
metadata:
  name: notificaciones
  namespace: ticket-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notificaciones
  template:
    metadata:
      labels:
        app: notificaciones
    spec:
      containers:
        - name: notificaciones
          image: python:3.11-alpine
          command: ["python", "/app/app.py"]
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: NOTIFICATION_FAIL_RATE
              value: "0"
          volumeMounts:
            - name: app-code
              mountPath: /app/app.py
              subPath: app.py
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: app-code
          configMap:
            name: notificaciones-code
---
apiVersion: v1
kind: Service
metadata:
  name: notificaciones
  namespace: ticket-system
spec:
  selector:
    app: notificaciones
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
