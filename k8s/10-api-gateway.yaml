apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ticket-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: python:3.11-alpine
          command: ["python", "/app/app.py"]
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: RESERVAS_URL
              value: "http://reservas:8080"
            - name: INVENTARIO_URL
              value: "http://inventario:8080"
            - name: RESERVAS_TIMEOUT_SECONDS
              value: "18"
          volumeMounts:
            - name: app-code
              mountPath: /app/app.py
              subPath: app.py
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: app-code
          configMap:
            name: api-gateway-code
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: ticket-system
spec:
  selector:
    app: api-gateway
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30081
