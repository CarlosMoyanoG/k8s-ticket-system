apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: ticket-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
        - name: database
          image: python:3.12-alpine
          command: ["python", "/app/app.py"]
          ports:
            - containerPort: 8080
          env:
            - name: DATA_FILE
              value: "/data/reservas.json"
          volumeMounts:
            - name: database-code
              mountPath: /app/app.py
              subPath: app.py
            - name: database-data
              mountPath: /data
      volumes:
        - name: database-code
          configMap:
            name: database-code
        - name: database-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: database
  namespace: ticket-system
spec:
  selector:
    app: database
  ports:
    - name: http
      port: 8080
      targetPort: 8080
