apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: ticket-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
        - name: database
          image: python:3.11-alpine
          command: ["python", "/app/app.py"]
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DATA_DIR
              value: "/data"
            - name: DEFAULT_EVENT
              value: "concierto-kubernetes"
            - name: DEFAULT_STOCK
              value: "10"
            - name: DATABASE_FAIL_WRITES
              value: "false"
          volumeMounts:
            - name: app-code
              mountPath: /app/app.py
              subPath: app.py
            - name: database-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: app-code
          configMap:
            name: database-code
        - name: database-data
          persistentVolumeClaim:
            claimName: database-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: database
  namespace: ticket-system
spec:
  selector:
    app: database
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
